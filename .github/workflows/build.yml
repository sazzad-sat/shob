name: Build

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Bun (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Bun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iex "& {$(irm https://bun.sh/install.ps1)} -Version 1.3.14"
          "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Verify Bun
        run: bun --version
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          
      - name: Install dependencies
        run: bun install

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          fi
          if [ "${release_tag}" != "v${package_version}" ]; then
            echo "::error::Release tag ${release_tag} does not match package.json version v${package_version}"
            exit 1
          fi
        
      - name: Build Electron app
        run: bun run build:electron
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.dmg.blockmap
            release/*.AppImage
            release/*.AppImage.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.tar.gz
            release/*.tar.gz.blockmap
            release/latest*.yml
          if-no-files-found: warn
          
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.dmg.blockmap
            release/*.AppImage
            release/*.AppImage.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.tar.gz
            release/*.tar.gz.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
