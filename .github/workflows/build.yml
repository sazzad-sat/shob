name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute.outputs.release_tag }}
      should_release: ${{ steps.compute.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: compute
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          should_release="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} already exists. Skipping auto-release."
              should_release="false"
            else
              should_release="true"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [[ "${GITHUB_ACTOR}" == "github-actions[bot]" ]]; then
              echo "Tag push from workflow bot detected. Skipping duplicate run."
              should_release="false"
            else
              should_release="true"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            should_release="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              should_release="true"
            else
              echo "Tag ${tag} does not exist. Push main or publish a release first."
            fi
          fi

          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag for main bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.compute.outputs.should_release == 'true'
        shell: bash
        run: |
          tag="${{ steps.compute.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "${tag}"

  build:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 + ARM64
            os: windows-latest
            artifact: windows
            builder_args: "--win --x64 --arm64"
            native_targets: "win32:arm64"
          - name: macOS x64 + ARM64 + universal
            os: macos-latest
            artifact: macos
            builder_args: "--mac --x64 --arm64 --universal"
            native_targets: "darwin:x64"
          - name: Linux x64 packages
            os: ubuntu-latest
            artifact: linux
            builder_args: "--linux --x64"
            native_targets: ""
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.release_tag }}
      
      - name: Setup Bun (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Bun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iex "& {$(irm https://bun.sh/install.ps1)} -Version 1.3.14"
          "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Verify Bun
        run: bun --version
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm dpkg xz-utils zstd || sudo apt-get install -y libfuse2t64 fakeroot rpm dpkg xz-utils zstd
          
      - name: Install dependencies
        run: bun install

      - name: Install cross-arch native dependencies
        if: matrix.native_targets != ''
        shell: bash
        env:
          NATIVE_TARGETS: ${{ matrix.native_targets }}
        run: |
          while IFS=: read -r target_os target_cpu; do
            if [[ -z "${target_os}" || -z "${target_cpu}" ]]; then
              continue
            fi
            echo "Installing native optional dependencies for ${target_os}-${target_cpu}"
            bun install --os="${target_os}" --cpu="${target_cpu}"
          done <<< "${NATIVE_TARGETS}"

      - name: Validate release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="${{ needs.prepare-release.outputs.release_tag }}"
          if [ "${release_tag}" != "v${package_version}" ]; then
            echo "::error::Release tag ${release_tag} does not match package.json version v${package_version}"
            exit 1
          fi
        
      - name: Build Electron app
        run: bun run build:electron -- ${{ matrix.builder_args }}

      - name: Add default Windows portable alias
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path release -Filter "shob-Portable-x64.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($portable) {
            Copy-Item -LiteralPath $portable.FullName -Destination (Join-Path $portable.DirectoryName "shob-Portable.exe") -Force
          } else {
            Write-Host "No x64 portable executable found for shob-Portable.exe alias."
          }
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.msi
            release/*.dmg
            release/*.dmg.blockmap
            release/*.AppImage
            release/*.AppImage.blockmap
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.pkg.tar.*
            release/*.zip
            release/*.zip.blockmap
            release/*.tar.gz
            release/*.tar.gz.blockmap
            release/latest*.yml
          if-no-files-found: warn
          
      - name: Publish release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:TAG_NAME
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Missing TAG_NAME"
          }

          $files = Get-ChildItem -Path release -File -ErrorAction SilentlyContinue | Where-Object {
            $_.Name -like "latest*.yml" -or
            $_.Name -like "*.exe" -or
            $_.Name -like "*.exe.blockmap" -or
            $_.Name -like "*.msi" -or
            $_.Name -like "*.dmg" -or
            $_.Name -like "*.dmg.blockmap" -or
            $_.Name -like "*.AppImage" -or
            $_.Name -like "*.AppImage.blockmap" -or
            $_.Name -like "*.deb" -or
            $_.Name -like "*.rpm" -or
            $_.Name -like "*.pacman" -or
            $_.Name -like "*.pkg.tar.*" -or
            $_.Name -like "*.zip" -or
            $_.Name -like "*.zip.blockmap" -or
            $_.Name -like "*.tar.gz" -or
            $_.Name -like "*.tar.gz.blockmap"
          }

          if (-not $files -or $files.Count -eq 0) {
            Write-Host "No release artifacts found for $tag on $env:RUNNER_OS. Skipping upload."
            exit 0
          }

          gh release view $tag --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo "$env:GITHUB_REPOSITORY" --title $tag --notes "Automated release $tag"
          }

          foreach ($file in $files) {
            gh release upload $tag $file.FullName --repo "$env:GITHUB_REPOSITORY" --clobber
          }
